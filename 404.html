<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <title>Página Não Encontrada | LCO Advocacia Empresarial</title>
  
  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="./Imagens/favicon.png">
  <link rel="apple-touch-icon" href="./Imagens/favicon.png">

  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css?v=20260723">

  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background-color: var(--bg-primary);
      position: relative;
      overflow: hidden;
    }

    .error-page::before {
      content: '404';
      position: absolute;
      font-size: clamp(15rem, 30vw, 35rem);
      font-weight: 800;
      font-family: var(--font-heading);
      color: rgba(194, 152, 80, 0.04);
      line-height: 1;
      user-select: none;
      pointer-events: none;
    }

    .error-content {
      position: relative;
      z-index: 1;
      max-width: 560px;
    }

    .error-icon {
      font-size: 4.5rem;
      color: var(--color-gold);
      margin-bottom: 1.5rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .error-code {
      font-family: var(--font-heading);
      font-size: clamp(3.5rem, 8vw, 5rem);
      font-weight: 800;
      color: var(--color-gold);
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .error-title {
      font-family: var(--font-heading);
      font-size: clamp(1.25rem, 3vw, 1.6rem);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 1rem;
    }

    .error-description {
      font-family: var(--font-main);
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .error-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .error-actions .btn {
      min-width: 180px;
    }

    .btn-outline-gold {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.85rem 1.8rem;
      border: 2px solid var(--color-gold);
      color: var(--color-gold);
      font-family: var(--font-heading);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 6px;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }

    .btn-outline-gold:hover {
      background-color: var(--color-gold);
      color: var(--bg-primary);
    }

    .error-footer-links {
      margin-top: 3rem;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .error-footer-links a {
      color: var(--text-secondary);
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .error-footer-links a:hover {
      color: var(--color-gold);
    }
  </style>
</head>
<body>

  <section class="error-page">
    <div class="error-content">
      <div class="error-icon">
        <i class="fa-solid fa-scale-unbalanced"></i>
      </div>
      <h1 class="error-code">404</h1>
      <h2 class="error-title">Página Não Encontrada</h2>
      <p class="error-description">
        A página que você está procurando pode ter sido removida, renomeada ou está temporariamente indisponível. 
        Mas não se preocupe — estamos aqui para orientá-lo.
      </p>
      <div class="error-actions">
        <a href="index.html" class="btn btn-gold btn-large">
          <span>Voltar ao Início</span>
          <i class="fa-solid fa-arrow-right"></i>
        </a>
        <a href="contato.html" class="btn-outline-gold">
          <span>Fale Conosco</span>
          <i class="fa-solid fa-paper-plane"></i>
        </a>
      </div>
      <div class="error-footer-links">
        <a href="sobre.html">O Escritório</a>
        <a href="atuacao.html">Áreas de Atuação</a>
        <a href="artigos.html">Artigos</a>
        <a href="contato.html">Contato</a>
      </div>
    </div>
  </section>

  <!-- Custom Script -->
  <script src="script.js?v=20260723" defer></script>
</body>
</html>
